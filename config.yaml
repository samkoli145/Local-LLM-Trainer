# configs/default_config.yaml
model:
  name: "microsoft/Phi-3-mini-4k-instruct"
  load_in_4bit: true
  use_dora: true

training:
  dataset_name: "imdb"
  num_steps: 500
  batch_size: 2
  learning_rate: 2.0e-4
  max_length: 512
  selection_strategy: "importance" # random, importance, diversity

memory:
  cache_dir: "./external_cache"
  cache_size_gb: 20.0
  use_mmap: true

system:
  device: "cuda"
  omp_num_threads: 4 # لمنع استهلاك الـ RAM الزائد على معالجات Xeon